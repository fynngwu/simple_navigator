# Waypoint Configuration - Square Path Demo
# Define waypoints with position (x, y) and orientation (yaw in degrees)

waypoints:
  # Home position (0, 0)
  home:
    x: 0.0
    y: 0.0
    yaw: 0.0  # degrees

  # Point A (1, 0) - right
  point_a:
    x: 1.0
    y: 0.0
    yaw: 90.0  # degrees

  # Point B (1, 1) - top right
  point_b:
    x: 1.0
    y: 1.0
    yaw: 180.0  # degrees

  # Point C (0, 1) - top left
  point_c:
    x: 0.0
    y: 1.0
    yaw: -90.0  # degrees

# Navigation parameters
navigation:
  position_tolerance: 0.05
  yaw_tolerance: 0.05
  control_frequency: 20.0
  
# Controller parameters
controller:
  kp_x: 1.0
  kp_y: 1.0
  kp_yaw: 1.0
  max_linear_velocity: 0.3
  max_angular_velocity: 0.5
  linear_deadband: 0.01
  angular_deadband: 0.01

# TF frames
frames:
  base_frame: "base_link"
  odom_frame: "odom"
  map_frame: "map"